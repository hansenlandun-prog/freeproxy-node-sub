name: Auto Proxy Platform with Rules

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install tools
      run: |
        sudo apt update
        sudo apt install curl jq -y

    - name: Fetch node sources
      run: |
        rm -f merged.txt
        touch merged.txt
        while read line
        do
          curl -L $line >> merged.txt
        done < sources.txt

    - name: Add private nodes
      run: |
        cat private_nodes.txt >> merged.txt || true

    - name: Remove duplicates
      run: |
        sort -u merged.txt -o merged.txt

    - name: Split regions
      run: |
        grep -Ei "HK|Hong Kong" merged.txt > hk.txt || true
        grep -Ei "JP|Japan" merged.txt > jp.txt || true
        grep -Ei "SG|Singapore" merged.txt > sg.txt || true

    - name: Generate optimized subscriptions
      run: |
        cp merged.txt all.txt
        cp merged.txt base64.txt
        cp merged.txt shadowrocket.txt
        cp merged.txt clash.yaml
        # Add rule-based optimization to clash.yaml
        echo "proxy-groups:" >> clash.yaml
        echo "  - name: \"Proxy\"" >> clash.yaml
        echo "    type: select" >> clash.yaml
        echo "    proxies:" >> clash.yaml
        echo "      - \"HK-VPS\"" >> clash.yaml
        echo "      - \"SG-VPS\"" >> clash.yaml
        echo "      - \"DIRECT\"" >> clash.yaml
        echo "rules:" >> clash.yaml
        echo "  - GEOIP,CN,DIRECT" >> clash.yaml
        echo "  - DOMAIN-SUFFIX,google.com,Proxy" >> clash.yaml
        echo "  - DOMAIN-SUFFIX,facebook.com,Proxy" >> clash.yaml
        echo "  - DOMAIN-SUFFIX,twitter.com,Proxy" >> clash.yaml
        echo "  - DOMAIN-SUFFIX,youtube.com,Proxy" >> clash.yaml
        echo "  - MATCH,Proxy" >> clash.yaml

    - name: Commit update
      run: |
        git config --global user.name github-actions
        git config --global user.email actions@github.com
        git add .
        git commit -m "update proxy platform with rule-based optimizations" || echo "no update"
        git push
