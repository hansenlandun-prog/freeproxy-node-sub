name: Auto Proxy Platform

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Install tools
      run: |
        sudo apt update
        sudo apt install curl -y

    - name: Download nodes
      run: |
        rm -f merged.txt
        touch merged.txt
        while read line
        do
          curl -L $line >> merged.txt
          echo "" >> merged.txt
        done < sources.txt

    - name: Add private nodes
      run: |
        cat private_nodes.txt >> merged.txt || true

    - name: Remove duplicates
      run: |
        sort -u merged.txt -o merged.txt

    - name: Remove invalid lines
      run: |
        grep -E "vmess://|vless://|trojan://|ss://" merged.txt > nodes.txt
        mv nodes.txt merged.txt

    - name: Generate subscriptions
      run: |
        cp merged.txt base64.txt
        cp merged.txt shadowrocket.txt

    - name: Commit files
      run: |
        git config --global user.name github-actions
        git config --global user.email actions@github.com
        git add .
        git commit -m "update nodes" || echo "no update"
        git push
