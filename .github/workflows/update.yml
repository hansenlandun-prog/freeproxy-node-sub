name: Update Proxy Subscription

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install curl -y

      - name: Download nodes
        run: |
          rm -f merged.txt
          touch merged.txt
          while read line
          do
            curl -L $line >> merged.txt
          done < nodes.txt

      - name: Remove duplicate
        run: |
          sort -u merged.txt -o merged.txt

      - name: Generate subscriptions
        run: |
          cp merged.txt base64.txt
          cp merged.txt shadowrocket.txt
          cp merged.txt clash.yaml

      - name: Commit
        run: |
          git config --global user.name github-actions
          git config --global user.email actions@github.com
          git add .
          git commit -m "update subscription" || echo "no update"
          git push
