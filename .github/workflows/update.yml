name: Update Nodes

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # --- 新增步骤：强制指定 Node 版本以消除警告 ---
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    # ---------------------------------------

    - name: Fetch nodes
      run: |
        rm -f all_nodes.txt
        touch all_nodes.txt
        while read -r line
        do
          # 加入 -s 选项可以让 curl 运行更安静
          curl -Ls "$line" >> all_nodes.txt
        done < nodes.txt

    - name: Commit and Push
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add .
        git commit -m "update nodes" || echo "no changes"
        git push
