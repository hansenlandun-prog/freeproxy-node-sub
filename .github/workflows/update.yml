name: Auto Update Proxy

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install curl jq -y

      - name: Fetch node sources
        run: |
          rm -f merged.txt
          touch merged.txt
          while read line
          do
            curl -L $line >> merged.txt
          done < sources.txt

      - name: Remove duplicates
        run: |
          sort -u merged.txt -o merged.txt

      - name: Generate subscriptions
        run: |
          cp merged.txt base64.txt
          cp merged.txt shadowrocket.txt
          cp merged.txt clash.yaml

      - name: Commit update
        run: |
          git config --global user.name github-actions
          git config --global user.email actions@github.com
          git add .
          git commit -m "auto update nodes" || echo "no update"
          git push
