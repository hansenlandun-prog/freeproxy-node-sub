name: Proxy Platform Pro

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Install tools
      run: |
        sudo apt update
        sudo apt install curl -y

    - name: Download nodes
      run: |
        rm -f merged.txt
        touch merged.txt
        while read line
        do
          curl -L $line >> merged.txt
        done < sources.txt

    - name: Add private nodes
      run: |
        cat private_nodes.txt >> merged.txt || true

    - name: Remove duplicates
      run: |
        sort -u merged.txt -o merged.txt

    - name: Split regions
      run: |
        grep -Ei "HK|Hong Kong" merged.txt > hk.txt || true
        grep -Ei "JP|Japan" merged.txt > jp.txt || true
        grep -Ei "SG|Singapore" merged.txt > sg.txt || true

    - name: Generate subscriptions
      run: |
        cp merged.txt base64.txt
        cp merged.txt shadowrocket.txt
        cp merged.txt fast.txt

    - name: Commit
      run: |
        git config --global user.name github-actions
        git config --global user.email actions@github.com
        git add .
        git commit -m "update nodes" || echo "no update"
        git push
