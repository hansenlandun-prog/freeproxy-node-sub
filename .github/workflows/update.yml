name: Auto Fast Proxy Update

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install tools
      run: |
        sudo apt update
        sudo apt install curl -y

    - name: Download nodes
      run: |
        rm -f merged.txt
        touch merged.txt
        while read line
        do
          curl -L $line >> merged.txt
        done < sources.txt

    - name: Remove duplicates
      run: |
        sort -u merged.txt -o merged.txt

    - name: Prefer Asia nodes
      run: |
        grep -Ei "HK|Hong Kong|JP|Japan|SG|Singapore" merged.txt > asia.txt || true
        head -n 100 asia.txt > filtered.txt

    - name: Generate subscriptions
      run: |
        cp filtered.txt base64.txt
        cp filtered.txt shadowrocket.txt
        cp filtered.txt clash.yaml

    - name: Commit update
      run: |
        git config --global user.name github-actions
        git config --global user.email actions@github.com
        git add .
        git commit -m "update fast nodes" || echo "no changes"
        git push
