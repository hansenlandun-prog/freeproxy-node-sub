name: Auto Proxy Platform

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Install tools
      run: |
        sudo apt update
        sudo apt install curl -y

    - name: Download nodes
      run: |
        rm -f merged.txt
        touch merged.txt
        while read line
        do
          echo "Downloading $line"
          curl -L --max-time 20 $line >> merged.txt
          echo "" >> merged.txt
        done < sources.txt

    - name: Add private nodes
      run: |
        cat private_nodes.txt >> merged.txt || true

    - name: Filter valid nodes
      run: |
        grep -E "vmess://|vless://|trojan://|ss://" merged.txt > nodes.txt

    - name: Remove duplicates
      run: |
        sort -u nodes.txt -o nodes.txt

    - name: Check nodes
      run: |
        if [ ! -s nodes.txt ]; then
          echo "No valid nodes found"
          exit 1
        fi

    - name: Generate subscriptions
      run: |
        cp nodes.txt base64.txt
        cp nodes.txt shadowrocket.txt

    - name: Commit files
      run: |
        git config --global user.name github-actions
        git config --global user.email actions@github.com
        git add .
        git commit -m "update nodes" || echo "no changes"
        git push
